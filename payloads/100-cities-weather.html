<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Cities Weather Report</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#fff;padding:20px}
h1{text-align:center;font-size:2em;margin:15px 0 5px;color:#f9d423}
.sub{text-align:center;color:#888;margin-bottom:20px;font-size:.9em}
table{width:100%;max-width:1100px;margin:0 auto;border-collapse:collapse}
th{background:#2d2d5e;padding:12px 15px;text-align:left;font-size:.95em;position:sticky;top:0}
td{padding:10px 15px;border-bottom:1px solid rgba(255,255,255,.08);font-size:.9em}
tr:hover td{background:rgba(255,255,255,.05)}
.hot{color:#ff6b6b}.warm{color:#ffa502}.mild{color:#7bed9f}.cool{color:#70a1ff}.cold{color:#a29bfe}
.footer{text-align:center;margin-top:20px;color:#555;font-size:.75em}
</style>
</head>
<body>
<h1>🌍 100 Cities Weather Report</h1>
<p class="sub">Randomly generated weather data for 100 cities worldwide</p>
<table>
<thead><tr><th>#</th><th>City</th><th>Country</th><th>Temp (°C)</th><th>Feels Like (°C)</th><th>Weather</th><th>Wind (km/h)</th></tr></thead>
<tbody id="tb"></tbody>
</table>
<p class="footer">Data is randomly generated for demonstration purposes · May 2026</p>
<script>
const cities=[
["Tokyo","Japan"],["New York","USA"],["London","UK"],["Paris","France"],["Sydney","Australia"],
["Dubai","UAE"],["Singapore","Singapore"],["Hong Kong","China"],["Seoul","South Korea"],["Mumbai","India"],
["São Paulo","Brazil"],["Mexico City","Mexico"],["Cairo","Egypt"],["Istanbul","Turkey"],["Bangkok","Thailand"],
["Toronto","Canada"],["Berlin","Germany"],["Madrid","Spain"],["Rome","Italy"],["Moscow","Russia"],
["Beijing","China"],["Shanghai","China"],["Lagos","Nigeria"],["Jakarta","Indonesia"],["Buenos Aires","Argentina"],
["Nairobi","Kenya"],["Lima","Peru"],["Bogotá","Colombia"],["Santiago","Chile"],["Johannesburg","South Africa"],
["Melbourne","Australia"],["Amsterdam","Netherlands"],["Stockholm","Sweden"],["Oslo","Norway"],["Helsinki","Finland"],
["Copenhagen","Denmark"],["Vienna","Austria"],["Prague","Czech Republic"],["Warsaw","Poland"],["Budapest","Hungary"],
["Athens","Greece"],["Lisbon","Portugal"],["Dublin","Ireland"],["Brussels","Belgium"],["Zurich","Switzerland"],
["Barcelona","Spain"],["Milan","Italy"],["Munich","Germany"],["Vancouver","Canada"],["Chicago","USA"],
["Los Angeles","USA"],["San Francisco","USA"],["Miami","USA"],["Houston","USA"],["Seattle","USA"],
["Denver","USA"],["Atlanta","USA"],["Boston","USA"],["Phoenix","USA"],["Las Vegas","USA"],
["Honolulu","USA"],["Anchorage","USA"],["Havana","Cuba"],["Kingston","Jamaica"],["San Juan","Puerto Rico"],
["Reykjavik","Iceland"],["Edinburgh","UK"],["Marrakech","Morocco"],["Tunis","Tunisia"],["Accra","Ghana"],
["Addis Ababa","Ethiopia"],["Dar es Salaam","Tanzania"],["Cape Town","South Africa"],["Casablanca","Morocco"],["Algiers","Algeria"],
["Riyadh","Saudi Arabia"],["Tehran","Iran"],["Karachi","Pakistan"],["Delhi","India"],["Colombo","Sri Lanka"],
["Kathmandu","Nepal"],["Dhaka","Bangladesh"],["Yangon","Myanmar"],["Hanoi","Vietnam"],["Manila","Philippines"],
["Kuala Lumpur","Malaysia"],["Taipei","Taiwan"],["Osaka","Japan"],["Perth","Australia"],["Auckland","New Zealand"],
["Suva","Fiji"],["Doha","Qatar"],["Kuwait City","Kuwait"],["Muscat","Oman"],["Baku","Azerbaijan"],
["Tbilisi","Georgia"],["Kyiv","Ukraine"],["Bucharest","Romania"],["Sofia","Bulgaria"],["Belgrade","Serbia"],
["Zagreb","Croatia"],["Bratislava","Slovakia"],["Ljubljana","Slovenia"],["Tallinn","Estonia"],["Riga","Latvia"]
];
const wx=["☀️ Sunny","⛅ Partly Cloudy","☁️ Overcast","🌧️ Rainy","⛈️ Thunderstorm","🌦️ Light Rain","❄️ Snowy","🌫️ Foggy","🌪️ Windy","🌤️ Mostly Sunny"];
function s(n){return function(){n=(n*9301+49297)%233280;return n/233280}}
const tb=document.getElementById("tb");
let html="";
cities.forEach(([city,country],i)=>{
const r=s(i*137+city.length*53);
const lat=Math.abs(((i*7+city.charCodeAt(0))%160)-80);
let base;if(lat<15)base=28+r()*10;else if(lat<30)base=20+r()*15;else if(lat<50)base=5+r()*20;else base=-10+r()*20;
const temp=Math.round(base);
const feels=temp+Math.round((r()-0.5)*8);
const w=wx[Math.floor(r()*wx.length)];
const wind=Math.round(3+r()*40);
let tc;if(temp>=35)tc="hot";else if(temp>=25)tc="warm";else if(temp>=15)tc="mild";else if(temp>=5)tc="cool";else tc="cold";
html+=`<tr><td>${i+1}</td><td><strong>${city}</strong></td><td>${country}</td><td class="${tc}">${temp}°</td><td class="${tc}">${feels}°</td><td>${w}</td><td>${wind}</td></tr>`;
});
tb.innerHTML=html;
</script>
</body>
</html>
